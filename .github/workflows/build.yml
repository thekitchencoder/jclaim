name: Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B clean verify

      - name: Generate Coverage Report
        run: mvn -B jacoco:report

      - name: Upload coverage to Codecov
        # No token: the org has Codecov's Global Upload Token feature
        # enabled for public repos. Passing an empty CODECOV_TOKEN env
        # var causes the action to attempt token auth with "" and the
        # server rejects with "Token required - not valid tokenless
        # upload". Omitting the env var lets the action fall through
        # to the tokenless path.
        uses: codecov/codecov-action@v6

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          # Multi-module reactor: each child module emits its own surefire-reports
          # under <module>/target/. The glob captures every module.
          path: '**/target/surefire-reports/'
