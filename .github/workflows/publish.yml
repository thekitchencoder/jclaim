#
# Publishes every JClaim module to Maven Central when a GitHub Release is
# created. Mirrors the sibling jspec project's mechanism.
#
# Required repository secrets:
#
#   CENTRAL_TOKEN_USERNAME   — Sonatype Central portal token username
#   CENTRAL_TOKEN_PASSWORD   — Sonatype Central portal token password
#   GPG_PRIVATE_KEY          — armoured private key used to sign release artefacts
#   GPG_PASSPHRASE           — passphrase for the GPG private key above
#
# The release version is taken from the GitHub Release name (e.g. a release
# named "0.1.0" publishes uk.codery:jclaim-*:0.1.0). `versions:set` rewrites
# the aggregator and every module from the in-repo SNAPSHOT to that version
# before the build.
#
name: Publish to Maven Central

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Update version to release version
        run: |
          mvn versions:set -DnewVersion=${{ github.event.release.name }}
          mvn versions:commit

      - name: Build and Test
        run: mvn --batch-mode clean verify

      - name: Publish to Maven Central
        run: mvn --batch-mode deploy -DskipTests -P release
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
