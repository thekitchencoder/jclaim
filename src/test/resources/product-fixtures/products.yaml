# Synthetic product SKU dataset for JClaim integration tests.
#
# Each entry is one real-world product (identified by the synthetic
# `id` field) with their source-system records nested under `records`.
# This document IS the ground truth: every record under one entry must
# end up linked to the same canonical entity after ingestion.
#
# Source systems:
#   pim         — product information management; the merchandising master
#                 record (gtin, manufacturer_part_number, brand, name,
#                 category, dimensions_cm, weight_g)
#   warehouse   — operational record (gtin, internal_sku, weight_g,
#                 bin_location)
#   marketplace — marketplace listing (gtin, listing_title, asin)
#   supplier    — manufacturer's catalogue (manufacturer_part_number,
#                 brand, product_family)
#
# Synthetic data conventions:
#   - Brand names are clearly fictional (Acme, Globex, Initech, Hooli,
#     Vandelay, Soylent, Tyrell, Cyberdyne, Aperture, Massive Dynamic,
#     Stark Industries).
#   - GTINs are 13-digit with correct check digits but the prefix 509990
#     is not allocated, so the codes do not collide with any real product.
#   - ASINs follow the synthetic shape `B0XXX####` — recognisably the
#     ASIN format but visibly fake.
#   - Manufacturer part numbers (MPN) follow `MPN-<BrandInitial>-####`.
#   - Internal warehouse SKUs follow `WH-<BRAND>-<DESC>` or
#     `WH-BULK-<DESC>` for SKU-only items.
#
# Scenario products (prod-001..prod-010) are explicitly engineered to
# exercise particular reconciliation patterns; see
# product-fixtures/README.md. Bulk products (prod-011..prod-100) provide
# volume and a realistic distribution of source-coverage (~50%
# single-source, ~25% two-source, ~11% three-source, ~4% all-four).

