      royal_mail_paf:
        source_id: "paf-100099000001"
        uprn: "100099000001"
        postcode: "SW1A 1AA"
        address_line_1: "12 Acacia Avenue"
        thoroughfare: "Acacia Avenue"
        building_number: "12"
      os_addressbase:
        source_id: "osab-100099000001"
        uprn: "100099000001"
        postcode: "SW1A 1AA"
        classification: "residential"
        easting: 530100
        northing: 180200
      land_registry:
        source_id: "lr-NGL100001"
        uprn: "100099000001"
        title_number: "NGL100001"
        tenure: "freehold"
        registered_at: "2018-04-12"
      council_tax:
        source_id: "ct-12001-A"
        uprn: "100099000001"
        postcode: "SW1A 1AA"
        band: "E"

