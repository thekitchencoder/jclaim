# Synthetic UK property dataset for JClaim integration tests.
#
# Each entry is one real-world UK property (identified by the synthetic
# `id` field) with their source-system records nested under `records`.
# This document IS the ground truth: every record under one entry must
# end up linked to the same canonical entity after ingestion.
#
# Source systems:
#   royal_mail_paf  — postal addressing (uprn, postcode, address_line_1,
#                     thoroughfare, building_number, sub_building)
#   os_addressbase  — geospatial authoritative (uprn, postcode,
#                     classification, easting, northing)
#   land_registry   — ownership (uprn, title_number, tenure, registered_at)
#   council_tax     — taxation (uprn, postcode, band)
#
# Synthetic data conventions:
#   - UPRNs are 12-digit plausible-shape but not real (they sit in the
#     unallocated `100099xxxxxx` range so they cannot collide with live
#     records).
#   - Postcodes are a mix of London landmark postcodes (clearly synthetic
#     when paired with the made-up street names) and fully fictional
#     postcodes such as `XX1 1XX`.
#   - Title numbers follow real UK Land Registry shape: 2-3 letter region
#     prefix + 6 digits (e.g. `NGL123456`).
#   - Street names are common (`Acacia Avenue`, `High Street`, `Mill Road`)
#     but combined with the synthetic UPRNs and landmark postcodes so
#     no entry corresponds to a real address.
#   - Eastings / Northings approximate the UK National Grid range but
#     are deliberately rounded to the nearest 100m so they're clearly
#     synthetic.
#
# Scenario properties (prop-001..prop-010) are explicitly engineered to
# exercise particular reconciliation patterns; see
# property-fixtures/README.md. Bulk properties (prop-011..prop-100)
# provide volume and a realistic distribution of source-coverage.

properties:

  # ─── Scenario properties ───────────────────────────────────────────

  # prop-001 — known to all four sources. The README quick-start hero.
  - id: prop-001
    notes: "Detached house in all four sources — README quick-start example."
