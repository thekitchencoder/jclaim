# Synthetic retail customer dataset for JClaim integration tests.
#
# Each entry is one real-world customer (identified by the synthetic
# `id` field) with their source-system records nested under `records`.
# This document IS the ground truth: every record under one entry must
# end up linked to the same canonical entity after ingestion.
#
# Source systems:
#   ecommerce — registration captures email + name + phone + registered_at
#   pos       — in-store captures phone + first_seen, sometimes a loyalty
#               number, sometimes a postcode
#   loyalty   — programme captures email + name + date_of_birth + postcode
#   crm       — support captures email + preferred_contact + case_count
#
# Synthetic data conventions:
#   - Email domain: @example.com (RFC 2606 reserved)
#   - UK phones: +44 7700 9xxxxx (Ofcom-reserved for fiction/drama)
#   - Postcodes: London/UK shapes, but generic placeholder strings
#   - Dates: ISO 8601 YYYY-MM-DD strings
#
# Scenario customers (cust-001..cust-010) are explicitly engineered to
# exercise particular reconciliation patterns; see retail-fixtures/README.md.
# Bulk customers (cust-011..cust-100) provide volume and a realistic
# distribution of source-coverage (~50% single-source, ~30% two-source,
# ~15% three-source, ~5% all-four).

customers:

  # ─── Scenario customers ────────────────────────────────────────────

  # cust-001 — known to all four sources. Used as the README example.
  - id: cust-001
    notes: "Featured in all four sources — README quick-start example."
    records:
      ecommerce:
        source_id: "ec-12345"
        email: "jane.doe@example.com"
        first_name: "Jane"
        last_name: "Doe"
        phone: "+44 7700 900123"
        registered_at: "2024-03-15"
      pos:
        source_id: "pos-78910"
        phone: "+44 7700 900123"
        loyalty_number: "L-22334"
        first_seen: "2024-04-22"
      loyalty:
        source_id: "L-22334"
        email: "jane.doe@example.com"
        first_name: "Jane"
        last_name: "Doe"
        date_of_birth: "1985-07-22"
        postcode: "SW1A 1AA"
      crm:
        source_id: "crm-99887"
        email: "jane.doe@example.com"
        preferred_contact: "email"
        case_count: 3

  # cust-002 — three sources (ecommerce + loyalty + crm).
